<!doctype html>
<html>
<head>
  <!-- A professional, styled CV for the web and print, using Markdown and CSS. Available at https://dionoss.github.io/markdown-cv/ -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}CV</title>
  <link href="media/{{ site.style }}-screen.css" type="text/css" rel="stylesheet" media="screen">
  <link href="media/{{ site.style }}-print.css" type="text/css" rel="stylesheet" media="print">
</head>
<body>
  <main id="main">
    <div id="content">
      {{ content }}
    </div>
  </main>
</body>
</html>
